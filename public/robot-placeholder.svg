<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="rg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#12253d"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a3050"/>
      <stop offset="100%" stop-color="#0a1525"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#rg)"/>

  <!-- Ambient glow behind head -->
  <ellipse cx="256" cy="260" rx="180" ry="200" fill="#0057ff" opacity="0.06"/>

  <!-- Head body -->
  <rect x="126" y="100" width="260" height="310" rx="32" fill="url(#face)" stroke="#1e4a8a" stroke-width="1.5"/>

  <!-- Head top panel -->
  <rect x="146" y="110" width="220" height="50" rx="12" fill="#0d1e35" stroke="#1a3a6a" stroke-width="1"/>

  <!-- Antenna base -->
  <rect x="242" y="68" width="28" height="36" rx="6" fill="#1e4a8a"/>
  <!-- Antenna bulb -->
  <circle cx="256" cy="58" r="14" fill="#00aaff" filter="url(#softglow)" opacity="0.9"/>
  <circle cx="256" cy="58" r="7" fill="#ffffff" opacity="0.6"/>

  <!-- Forehead circuit lines -->
  <path d="M166 135 L196 135 L196 148 L220 148" stroke="#2a5a9a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M346 135 L316 135 L316 148 L292 148" stroke="#2a5a9a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="220" cy="148" r="4" fill="#00aaff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="292" cy="148" r="4" fill="#00aaff" opacity="0.9" filter="url(#glow)"/>

  <!-- LEFT EYE -->
  <rect x="152" y="198" width="88" height="36" rx="10" fill="#051020" stroke="#1a3a6a" stroke-width="1"/>
  <rect x="157" y="203" width="78" height="26" rx="7" fill="#00aaff" filter="url(#glow)" opacity="0.85"/>
  <!-- Eye scan line -->
  <rect x="157" y="214" width="78" height="3" fill="#ffffff" opacity="0.4"/>

  <!-- RIGHT EYE -->
  <rect x="272" y="198" width="88" height="36" rx="10" fill="#051020" stroke="#1a3a6a" stroke-width="1"/>
  <rect x="277" y="203" width="78" height="26" rx="7" fill="#00aaff" filter="url(#glow)" opacity="0.85"/>
  <rect x="277" y="214" width="78" height="3" fill="#ffffff" opacity="0.4"/>

  <!-- Nose sensor panel -->
  <rect x="236" y="258" width="40" height="32" rx="8" fill="#0d1e35" stroke="#1a3a6a" stroke-width="1"/>
  <circle cx="256" cy="274" r="9" fill="#00aaff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="256" cy="274" r="4" fill="#ffffff" opacity="0.5"/>

  <!-- Mouth panel -->
  <rect x="168" y="308" width="176" height="38" rx="10" fill="#0d1e35" stroke="#1a3a6a" stroke-width="1"/>
  <!-- LED teeth/bars -->
  <rect x="178" y="318" width="26" height="18" rx="4" fill="#00aaff" opacity="0.80" filter="url(#glow)"/>
  <rect x="211" y="318" width="26" height="18" rx="4" fill="#00aaff" opacity="0.45"/>
  <rect x="244" y="318" width="26" height="18" rx="4" fill="#00aaff" opacity="0.80" filter="url(#glow)"/>
  <rect x="277" y="318" width="26" height="18" rx="4" fill="#00aaff" opacity="0.45"/>
  <rect x="310" y="318" width="26" height="18" rx="4" fill="#00aaff" opacity="0.80" filter="url(#glow)"/>

  <!-- Chin panel -->
  <rect x="208" y="370" width="96" height="22" rx="7" fill="#0d1e35" stroke="#1a3a6a" stroke-width="1"/>
  <rect x="220" y="378" width="72" height="6" rx="3" fill="#2a5a9a"/>

  <!-- LEFT EAR -->
  <rect x="82" y="188" width="46" height="94" rx="12" fill="#0d1e35" stroke="#1a3a6a" stroke-width="1.5"/>
  <circle cx="105" cy="235" r="12" fill="#00aaff" opacity="0.85" filter="url(#softglow)"/>
  <circle cx="105" cy="235" r="5"  fill="#ffffff" opacity="0.5"/>
  <rect x="90"  y="267" width="30" height="5" rx="2" fill="#2a5a9a"/>
  <rect x="90"  y="278" width="20" height="5" rx="2" fill="#2a5a9a" opacity="0.6"/>

  <!-- RIGHT EAR -->
  <rect x="384" y="188" width="46" height="94" rx="12" fill="#0d1e35" stroke="#1a3a6a" stroke-width="1.5"/>
  <circle cx="407" cy="235" r="12" fill="#00aaff" opacity="0.85" filter="url(#softglow)"/>
  <circle cx="407" cy="235" r="5"  fill="#ffffff" opacity="0.5"/>
  <rect x="392" y="267" width="30" height="5" rx="2" fill="#2a5a9a"/>
  <rect x="402" y="278" width="20" height="5" rx="2" fill="#2a5a9a" opacity="0.6"/>

  <!-- Bottom vents -->
  <rect x="176" y="400" width="40" height="6" rx="3" fill="#1a3a6a" opacity="0.7"/>
  <rect x="236" y="400" width="40" height="6" rx="3" fill="#1a3a6a" opacity="0.7"/>
  <rect x="296" y="400" width="40" height="6" rx="3" fill="#1a3a6a" opacity="0.7"/>

  <!-- Shoulder / collar -->
  <ellipse cx="256" cy="430" rx="180" ry="55" fill="#08111f"/>
</svg>
