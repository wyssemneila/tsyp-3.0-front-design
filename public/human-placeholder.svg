<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#1a0e08"/>
      <stop offset="100%" stop-color="#070408"/>
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#d9a07a"/>
      <stop offset="60%" stop-color="#c07a52"/>
      <stop offset="100%" stop-color="#8c4a28"/>
    </radialGradient>
    <radialGradient id="skin2" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#cc9068"/>
      <stop offset="100%" stop-color="#8c4a28"/>
    </radialGradient>
    <radialGradient id="hair" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#2a1a0a"/>
      <stop offset="100%" stop-color="#0d0804"/>
    </radialGradient>
    <radialGradient id="iris" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6b4020"/>
      <stop offset="100%" stop-color="#1a0a04"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Neck & collar -->
  <rect x="196" y="395" width="120" height="130" rx="20" fill="url(#skin2)"/>
  <!-- Shoulder/shirt -->
  <ellipse cx="256" cy="512" rx="210" ry="90" fill="#181010"/>
  <ellipse cx="256" cy="490" rx="180" ry="70" fill="#201414"/>

  <!-- Head shape -->
  <ellipse cx="256" cy="240" rx="155" ry="180" fill="url(#skin)"/>

  <!-- Hair – sides -->
  <ellipse cx="256" cy="90"  rx="158" ry="88"  fill="url(#hair)"/>
  <ellipse cx="110" cy="195" rx="48"  rx2="48" ry="100" fill="url(#hair)"/>
  <ellipse cx="402" cy="195" rx="48"  ry="100"  fill="url(#hair)"/>
  <!-- hair sides proper -->
  <path d="M108 140 Q78 220 92 320 Q112 295 120 240 Q130 170 150 130 Z" fill="url(#hair)"/>
  <path d="M404 140 Q434 220 420 320 Q400 295 392 240 Q382 170 362 130 Z" fill="url(#hair)"/>
  <!-- hair top overlap -->
  <ellipse cx="256" cy="86" rx="155" ry="82" fill="url(#hair)"/>

  <!-- Ears -->
  <ellipse cx="101" cy="245" rx="22" ry="30" fill="#b87050"/>
  <ellipse cx="411" cy="245" rx="22" ry="30" fill="#b87050"/>
  <!-- inner ear -->
  <ellipse cx="103" cy="247" rx="12" ry="18" fill="#a06040" opacity="0.6"/>
  <ellipse cx="409" cy="247" rx="12" ry="18" fill="#a06040" opacity="0.6"/>

  <!-- EYEBROWS -->
  <path d="M168 196 Q200 183 232 188" stroke="#2a1205" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M280 188 Q312 183 344 196" stroke="#2a1205" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- LEFT EYE -->
  <!-- eye whites -->
  <ellipse cx="200" cy="224" rx="34" ry="22" fill="#f0ece8"/>
  <!-- iris -->
  <circle cx="200" cy="226" r="17" fill="url(#iris)"/>
  <!-- pupil -->
  <circle cx="200" cy="226" r="9" fill="#0d0804"/>
  <!-- catchlight -->
  <circle cx="207" cy="220" r="5" fill="white" opacity="0.75"/>
  <circle cx="195" cy="229" r="2" fill="white" opacity="0.3"/>
  <!-- upper eyelid shadow -->
  <path d="M167 218 Q200 207 233 218" stroke="#1a0a04" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- lower lash line -->
  <path d="M170 232 Q200 240 230 232" stroke="#6a3010" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- RIGHT EYE -->
  <ellipse cx="312" cy="224" rx="34" ry="22" fill="#f0ece8"/>
  <circle cx="312" cy="226" r="17" fill="url(#iris)"/>
  <circle cx="312" cy="226" r="9" fill="#0d0804"/>
  <circle cx="319" cy="220" r="5" fill="white" opacity="0.75"/>
  <circle cx="307" cy="229" r="2" fill="white" opacity="0.3"/>
  <path d="M279 218 Q312 207 345 218" stroke="#1a0a04" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M282 232 Q312 240 342 232" stroke="#6a3010" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- NOSE -->
  <!-- bridge shadow -->
  <path d="M252 248 L242 295 Q256 307 270 295 L260 248 Z" fill="#a06040" opacity="0.25"/>
  <!-- nostrils -->
  <ellipse cx="240" cy="300" rx="14" ry="9" fill="#a06040" opacity="0.55"/>
  <ellipse cx="272" cy="300" rx="14" ry="9" fill="#a06040" opacity="0.55"/>
  <!-- tip highlight -->
  <ellipse cx="256" cy="295" rx="10" ry="7" fill="#d0904a" opacity="0.3"/>

  <!-- LIPS -->
  <!-- upper lip -->
  <path d="M218 330 Q235 320 248 323 Q256 325 264 323 Q277 320 294 330 Q278 326 264 328 Q256 329 248 328 Q234 326 218 330 Z"
        fill="#8a3020" opacity="0.9"/>
  <!-- cupid's bow dip -->
  <path d="M236 324 Q248 319 260 324" stroke="#6a2015" stroke-width="1.5" fill="none"/>
  <!-- lower lip -->
  <path d="M218 330 Q237 352 256 354 Q275 352 294 330 Q275 347 256 349 Q237 347 218 330 Z"
        fill="#7a2818" opacity="0.85"/>
  <!-- lower lip highlight -->
  <ellipse cx="256" cy="346" rx="28" ry="7" fill="#b06040" opacity="0.2"/>
  <!-- lip line center -->
  <path d="M220 330 Q256 333 292 330" stroke="#8a3020" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Chin shadow -->
  <ellipse cx="256" cy="395" rx="65" ry="18" fill="#904830" opacity="0.25" filter="url(#soft)"/>

  <!-- Subtle face contour shadows -->
  <path d="M126 200 Q115 260 132 340" stroke="#7a4020" stroke-width="10" fill="none" opacity="0.12" stroke-linecap="round"/>
  <path d="M386 200 Q397 260 380 340" stroke="#7a4020" stroke-width="10" fill="none" opacity="0.12" stroke-linecap="round"/>

  <!-- Cheek blush subtle -->
  <ellipse cx="156" cy="268" rx="38" ry="22" fill="#d07050" opacity="0.08"/>
  <ellipse cx="356" cy="268" rx="38" ry="22" fill="#d07050" opacity="0.08"/>
</svg>
